<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тренажёр</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div id="lesson-type-selection-screen" style="display: none">
        <div class="d-flex flex-column w-500px mx-auto gap-1">
          <h2 class="text-center pb-4 mb-4 border-bottom">Начало урока</h2>
          <h3>Выберите тип вопросов</h3>
          <a id="start-lesson-hanzi-tone-button" class="btn btn-primary" href="javascript:void(0)">Кандзи - Тоны</a>
          <a id="start-lesson-pynyin-tone-button" class="btn btn-primary" href="javascript:void(0)">Пиньинь - Тоны</a>
          <a id="start-lesson-hanzi-translation-button" class="btn btn-primary" href="javascript:void(0)">Кандзи - Перевод</a>
          <a id="start-lesson-pynyin-translation-button" class="btn btn-primary" href="javascript:void(0)">Пиньинь - Перевод</a>
        </div>
      </div>
      <div id="lesson-screen" style="display: none">
        <div class="d-flex flex-column w-500px mx-auto">
          <h2 id="round-number" class="text-center pb-4 mb-4 border-bottom"></h2>
          <h3 id="question-number" class="mb-4"></h3>
          <div id="question-html"></div>
          <div class="d-flex flex-row gap-1">
            <input id="answer-input" class="flex-grow-1" type="text" size="1" placeholder="Введите ответ" disabled autocomplete="off" />
            <a id="send-answer-button" class="btn btn-primary disabled" href="javascript:void(0)">Отправить</a>
          </div>
        </div>
      </div>
    </div>
  </body>

  <script type="module" src="js/index.js"></script>
</html>
